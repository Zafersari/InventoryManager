/*
 * Gradle build script - Groovy DSL
 */
plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

javafx {
    version = '21'
    modules = ['javafx.controls', 'javafx.fxml']
}

application {
    mainClass = 'app.Launcher'   // MainApp değil, Launcher!
}

// Ensure source files (which contain €, →, box-drawing chars) compile
// as UTF-8 regardless of the machine's default platform encoding.
tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}